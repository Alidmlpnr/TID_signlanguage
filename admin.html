<!doctype html>

<html lang="tr">
<head>
<meta charset="utf-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #f8fafc;
  color: #0f172a;
  margin: 20px;
}
.container {
  max-width: 900px;
  margin: 0 auto;
}
.card {
  background: #ffffff;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  margin-top: 10px;
  width: 100%;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  background: #6366f1;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  background: #4f46e5;
}

.hidden {
  display: none;
}
  .form-box {
  max-width: 350px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}

.form-box input {
  width: 100%;
}
</style>

</head>

<body>
<div class="container">
<h1> Yönetim Paneli</h1>

<!-- LOGIN -->

<div id="loginBox" class="card">
  <h2>Giriş</h2>
 <div class="form-box">
    <input type="text" id="username" placeholder="Kullanıcı adı">
    <input type="password" id="password" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>
  </div>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- PANEL -->

<div id="panel" class="hidden">

  <div class="card">
    <h2> Kullanım Geçmişi</h2>
    <ul id="logs"></ul>
  </div>

  <div class="card">
    <h2> İşlemler</h2>
    <button onclick="clearLogs()">Tüm Veriyi Sil</button>
  </div>

</div>

<script>
// basit kullanıcı bilgisi
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

// login
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").classList.remove("hidden");
    loadLogs();
  } else {
    document.getElementById("loginError").textContent = "Hatalı giriş!";
  }
}

// logları yükle
function loadLogs() {
  const logs = JSON.parse(localStorage.getItem("tid_logs") || "[]");
  const list = document.getElementById("logs");
  list.innerHTML = "";

  logs.forEach(log => {
    const li = document.createElement("li");
    li.textContent = log;
    list.appendChild(li);
  });
}

// sil
function clearLogs() {
  localStorage.removeItem("tid_logs");
  loadLogs();
}
</script>
</div>
</body>
</html>
